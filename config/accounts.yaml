# accounts.yaml — Seele 号池配置
#
# 支持多 Provider 多账号，Agent 启动时通过 -a 或 ProviderAccountPath 加载。
# 优先级：数字越小优先级越高；round-robin 在同优先级间轮转。
#
# ProviderType 支持：
#   openai     — OpenAI 兼容协议（/chat/completions）
#   anthropic  — Anthropic Claude（/v1/messages，需注册 AnthropicStrategy）
#
# 示例：

accounts:
  # ── 你的 OpenAI 账号 ──
  - name: openai-main
    provider: openai
    base_url: https://api.openai.com/v1
    api_key: sk-proj-xxxx
    model: gpt-4o
    priority: 1

  # ── 你的 Anthropic 账号 ──
  - name: anthropic-main
    provider: anthropic
    base_url: https://api.anthropic.com
    api_key: sk-ant-xxxx
    model: claude-3-5-sonnet-20241022
    priority: 2

  # ── 多 OpenAI 账号（round-robin 轮转） ──
  - name: openai-fallback
    provider: openai
    base_url: https://api.openai.com/v1
    api_key: sk-proj-yyyy
    model: gpt-4o-mini
    priority: 3

  # ── 本地模型（Ollama 等，走 OpenAI 兼容协议） ──
  - name: ollama-local
    provider: openai
    base_url: http://localhost:11434/v1
    api_key: ollama
    model: llama3
    priority: 10
    disabled: true          # disabled: true 时号池会跳过此账号
