// Seele Agent Network API
//
// 将 *agent.Agent 暴露为 gRPC 服务。
// 远程客户端通过此 API 创建会话、发起对话、注册工具。
syntax = "proto3";
package seele.api;
option go_package = "github.com/RedHuang-0622/Seele/sdk/api";

// AgentService 是 Seele Agent 的网络 API。
service AgentService {
  // Chat 在指定会话中发起一次对话（ReAct 循环）。
  rpc Chat(ChatRequest) returns (ChatResponse);

  // ChatStream 流式对话，逐 chunk 返回文本。
  rpc ChatStream(ChatRequest) returns (stream ChatChunk);

  // NewSession 创建一个新会话，返回 session_id。
  rpc NewSession(NewSessionRequest) returns (NewSessionResponse);

  // Health 健康检查。
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ChatRequest {
  string session_id = 1;  // 会话标识（由 NewSession 返回）
  string input = 2;       // 用户输入
}

message ChatResponse {
  string reply = 1;       // Agent 的最终文本回复
  int32 loops = 2;        // 经过的 ReAct 循环次数
}

message ChatChunk {
  string delta = 1;       // 流式文本增量
  bool done = 2;          // 是否结束
  string final_reply = 3; // 最终完整回复（done=true 时有效）
  string error = 4;       // 错误信息（如有）
}

message NewSessionRequest {
  string system_prompt = 1;  // 系统提示词
  int32 max_loops = 2;       // 最大 ReAct 循环次数，0=使用默认值
}

message NewSessionResponse {
  string session_id = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;  // "ok"
  int32 tool_count = 2;
}
